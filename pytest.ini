[pytest]
# UI (browser) tests are deselected by default so `pytest tests/ -q` stays the
# fast 22-test unit run — and so delegate-local's pytest-only run_tests tool is
# unaffected. The UI runner opts them in with `-m ui`.
addopts = -m "not ui"
markers =
    ui: browser-driven Playwright UI/UX test (deselected by default)
    ux(id): binds a test to a UX_TEST_PLAN case id, e.g. @pytest.mark.ux("UX-NAV-01")
